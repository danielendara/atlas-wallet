name: Bug report
description: Report something that is broken in AirWallet.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Please do not include real child names, private ledger data, or screenshots containing family information."
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: AirWallet version
      placeholder: "0.1.0"
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Open AirWallet..."
    validations:
      required: true
